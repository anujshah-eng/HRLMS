services:
  web:
    ports:
      - "8003:8000"
    env_file:
      - ./envs/.env.prod
    environment:
      APP_ENV: "prod"
      DEBUG: "false"
    volumes: []

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web  
