services:
  web:
    ports:
      - "8002:8000"
    env_file:
      - ./envs/.env.staging
    environment:
      APP_ENV: "staging"
      DEBUG: "false"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web  
